name: Actualización diaria de commodities

on:
  schedule:
    - cron: "0 13 * * 1-5"  # 10:00 AM Argentina (UTC-3), lunes a viernes
  workflow_dispatch:          # permite correrlo manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr script de extracción
        run: python src/commodities_etl.py

      - name: Commitear datos actualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: actualización $(date +'%Y-%m-%d')"
          git push

